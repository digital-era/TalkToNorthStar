<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>加载中...</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        background: #0a0e27;
        color: #e0e0e0;
        line-height: 1.9;
        min-height: 100vh;
        padding-bottom: 100px;
    }
    .loading {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        color: #667eea;
        font-size: 16px;
    }
    .hero {
        width: 100%;
        margin-top: 24px;
        text-align: center;
    }
    .hero img {
        width: 90%;
        max-width: 1000px;
        height: auto;
        display: block;
        margin: 0 auto;
    }
    @media (max-width: 768px) {
        .hero img {
            width: 100%;
            max-width: none;
        }
    }
    .content {
        max-width: 720px;
        margin: 0 auto;
        padding: 40px 24px 60px;
    }
    .meta {
        margin-bottom: 32px;
        padding-bottom: 20px;
        border-bottom: 1px solid rgba(197, 160, 89, 0.2);
    }
    .meta-name {
        font-size: 26px;
        font-weight: bold;
        color: #d4c4a8;
        margin-bottom: 6px;
    }
    .meta-field {
        font-size: 13px;
        color: #667eea;
        letter-spacing: 1px;
    }
    .body-text {
        font-size: 16px;
        line-height: 1.9;
        color: #c5c8d6;
    }
    .body-text p { margin-bottom: 1.2em; text-align: justify; }
    .body-text h1, .body-text h2, .body-text h3, .body-text h4, .body-text h5, .body-text h6 {
        color: #d4c4a8;
        margin: 1.5em 0 0.8em;
        line-height: 1.4;
    }
    .body-text h1 {
        font-size: 1.5em;
        border-left: 4px solid #c5a059;
        padding-left: 12px;
    }
    .body-text h2 {
        font-size: 1.3em;
        border-left: 3px solid rgba(197, 160, 89, 0.6);
        padding-left: 10px;
    }
    .body-text h3 { font-size: 1.15em; color: #d4c4a8; }
    .body-text strong, .body-text b { color: #fff; font-weight: 600; }
    .body-text blockquote {
        margin: 1.2em 0;
        padding: 12px 20px;
        border-left: 3px solid #667eea;
        background: rgba(102, 126, 234, 0.08);
        color: #b0b8d0;
        font-style: italic;
    }
    .body-text blockquote p:last-child { margin-bottom: 0; }
    .body-text ul, .body-text ol { margin: 1em 0; padding-left: 2em; }
    .body-text li { margin-bottom: 0.5em; }
    .body-text code {
        background: rgba(255,255,255,0.08);
        padding: 2px 6px;
        border-radius: 4px;
        font-family: 'SF Mono', Monaco, monospace;
        font-size: 0.9em;
        color: #e0c080;
    }
    .body-text pre {
        background: rgba(0,0,0,0.3);
        padding: 16px;
        border-radius: 8px;
        overflow-x: auto;
        margin: 1em 0;
    }
    .body-text pre code { background: none; padding: 0; }
    .body-text hr {
        border: none;
        height: 1px;
        background: linear-gradient(to right, transparent, rgba(197,160,89,0.3), transparent);
        margin: 2em 0;
    }
    .body-text a {
        color: #667eea;
        text-decoration: none;
        border-bottom: 1px solid rgba(102,126,234,0.3);
    }
    .body-text a:hover { border-bottom-color: #667eea; }
    .footer {
        text-align: center;
        padding: 40px 24px 80px;
        border-top: 1px solid rgba(255,255,255,0.08);
    }
    .footer-logo {
        font-size: 18px;
        color: #667eea;
        margin-bottom: 8px;
        letter-spacing: 2px;
    }
    .footer-text {
        font-size: 12px;
        color: #fff;
    }
    .stars {
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        pointer-events: none;
        z-index: -1;
        opacity: 0.4;
        background-image: 
            radial-gradient(2px 2px at 20px 30px, rgba(255,255,255,0.4), transparent),
            radial-gradient(2px 2px at 40px 70px, rgba(255,255,255,0.3), transparent),
            radial-gradient(1px 1px at 90px 40px, rgba(255,255,255,0.4), transparent);
        background-size: 220px 220px;
    }
    .download-bar {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        padding: 16px 24px;
        background: rgba(10, 14, 39, 0.95);
        border-top: 1px solid rgba(102, 126, 234, 0.2);
        display: flex;
        justify-content: center;
        gap: 12px;
        z-index: 100;
        backdrop-filter: blur(10px);
    }
    .download-btn {
        background: #667eea;
        color: white;
        border: none;
        padding: 12px 32px;
        border-radius: 24px;
        font-size: 15px;
        cursor: pointer;
        letter-spacing: 1px;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        gap: 8px;
    }
    .download-btn:hover {
        background: #5a6fd6;
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
    }
    .download-btn:active { transform: translateY(0); }
    .error-msg {
        text-align: center;
        padding: 100px 24px;
        color: #ff6b6b;
    }
<style>
</head>
<body>
<div class="loading" id="loading">✦ <span id="loadingText">加载中...</span></div>
<div id="app" style="display:none;">
    <div class="stars"></div>
    <div class="hero" id="hero"></div>
    <div class="content">
        <div class="meta">
            <div class="meta-name" id="title"></div>
            <div class="meta-field" id="field"></div>
        </div>
        <div class="body-text" id="content"></div>
    </div>
    <div class="footer">
        <div class="footer-logo">✦ <span id="footerLogoText">对话北极星</span></div>
        <div class="footer-text" id="footerText">书写思想旋律，点燃潜能火花</div>
    </div>
    <div class="download-bar">
        <button class="download-btn" onclick="downloadPage()">
            <span>💾</span>
            <span id="saveText">保存页面</span>
        </button>
    </div>
</div>

<!-- 【按指定顺序引用主应用 JS】 -->
<script src="../scripts/applogic.js"></script>
<script src="../scripts/StarryColumn.js"></script>
<script src="../scripts/importmdfile.js"></script>
<script src="../scripts/speech.js"></script>
<script src="../scripts/createwebpage.js"></script>

<script>
// ═══════════════════════════════════════════════════
// 初始化语言（复用主应用逻辑）
// ═══════════════════════════════════════════════════
const lang = window.currentLang || 'zh-CN';

const _t = (key) => {
    if (window.translations && window.translations[lang] && window.translations[lang][key]) {
        return window.translations[lang][key];
    }
    if (window.shareTextKeys && window.shareTextKeys[key]) {
        return getFieldValue(window.shareTextKeys[key], lang) || key;
    }
    if (window.starryColumnTexts && window.starryColumnTexts[key]) {
        return getFieldValue(window.starryColumnTexts[key], lang) || key;
    }
    return key;
};

// ═══════════════════════════════════════════════════
// 页面配置
// ═══════════════════════════════════════════════════
const CONFIG = {
    getColumnName() {
        const path = window.location.pathname;
        const fileName = path.split('/').pop();
        return fileName.replace('.html', '');
    }
};

// ═══════════════════════════════════════════════════
// 加载专栏内容
// ═══════════════════════════════════════════════════
async function loadColumn() {
    const columnName = CONFIG.getColumnName();
    // 【修复】相对路径，与 scripts 引用保持一致
    const mdPath = `../StarryColumn/${columnName}.md`;

    // ── 加载封面图 ──
    const imgExtensions = ['jpg', 'png', 'jpeg', 'webp'];
    let coverUrl = '';

    for (const ext of imgExtensions) {
        // 【修复】相对路径
        const imgPath = `../images/${columnName}.${ext}`;
        try {
            const response = await fetch(imgPath, { method: 'HEAD' });
            if (response.ok) {
                coverUrl = imgPath;
                break;
            }
        } catch (e) {}
    }
    if (!coverUrl) {
        // 【修复】相对路径
        coverUrl = '../images/ambient-starry-column.jpg';
    }

    // ── 加载并解析 MD ──
    try {
        const response = await fetch(mdPath);
        
        if (!response.ok) {
            if (response.status === 404) {
                throw new Error('FILE_NOT_FOUND');
            }
            throw new Error(`HTTP ${response.status}`);
        }

        const mdContent = await response.text();

        if (!mdContent || mdContent.trim().length === 0) {
            throw new Error('EMPTY_FILE');
        }

        const importedHistory = parseMDToHistory(mdContent);

        if (!importedHistory || importedHistory.length === 0) {
            throw new Error('PARSE_EMPTY');
        }

        const history = getMergedHistory(importedHistory, []);

        const aiNodes = history.filter(n => n.role === 'ai' || n.role === 'assistant');
        if (aiNodes.length === 0) {
            throw new Error('NO_AI_NODE');
        }
        const lastAiNode = aiNodes[aiNodes.length - 1];

        const title = lastAiNode.leaderInfo?.name || columnName;
        const field = lastAiNode.leaderInfo?.field || _t('columnArticle') || '专栏文章';

        const htmlContent = parseMarkdownWithMath(lastAiNode.text)
            .replace(/<img[^>]*>/g, '');

        document.getElementById('title').textContent = title;
        document.getElementById('field').textContent = field;

        const heroEl = document.getElementById('hero');
        heroEl.innerHTML = `<img src="${coverUrl}" alt="${escapeHtml(title)}" onerror="this.style.display='none'; this.parentElement.style.background='linear-gradient(135deg, #0f0c29, #302b63, #24243e)';">`;

        document.getElementById('content').innerHTML = htmlContent;

        document.getElementById('loadingText').textContent = _t('loading') || '加载中...';
        document.getElementById('footerLogoText').textContent = _t('appName') || '对话北极星';
        document.getElementById('footerText').textContent = _t('appSlogan') || '书写思想旋律，点燃潜能火花';
        document.getElementById('saveText').textContent = _t('savePage') || '保存页面';

        document.title = `${title} · ${_t('appName') || '对话北极星'}`;

        document.getElementById('loading').style.display = 'none';
        document.getElementById('app').style.display = 'block';

        if (window.MathJax && window.MathJax.typesetPromise) {
            MathJax.typesetPromise([document.getElementById('content')])
                .catch(err => console.warn('MathJax error:', err));
        }

    } catch (e) {
        console.error('Failed to load column:', e);

        let errorMsg;
        if (e.message === 'FILE_NOT_FOUND') {
            errorMsg = _t('columnFileNotFound') || `专栏文件不存在：${mdPath}`;
        } else if (e.message === 'EMPTY_FILE') {
            errorMsg = _t('columnFileEmpty') || '专栏文件内容为空';
        } else if (e.message === 'PARSE_EMPTY') {
            errorMsg = _t('columnParseFailed') || '无法解析专栏内容';
        } else if (e.message === 'NO_AI_NODE') {
            errorMsg = _t('columnNoAINode') || '专栏中没有找到 AI 回答节点';
        } else {
            errorMsg = (_t('columnLoadFailed') || '加载失败') + e.message;
        }

        document.getElementById('loading').innerHTML = `
            <div class="error-msg">
                <div>${escapeHtml(errorMsg)}</div>
            </div>
        `;
    }
}

function downloadPage() {
    const html = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;
    const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = document.title.replace(/[\\/:*?"<>|]/g, '_') + '.html';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
}

document.addEventListener('DOMContentLoaded', loadColumn);
</script>
</body>
</html>
