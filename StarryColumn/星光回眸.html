<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>加载中...</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        background: #0a0e27;
        color: #e0e0e0;
        line-height: 1.9;
        min-height: 100vh;
        padding-bottom: 100px;
    }
    .loading {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        color: #667eea;
        font-size: 16px;
    }
    .hero {
        width: 100%;
        margin-top: 24px;
        text-align: center;
    }
    .hero img {
        width: 90%;
        max-width: 1000px;
        height: auto;
        display: block;
        margin: 0 auto;
    }
    @media (max-width: 768px) {
        .hero img {
            width: 100%;
            max-width: none;
        }
    }
    .content {
        max-width: 720px;
        margin: 0 auto;
        padding: 40px 24px 60px;
    }
    .meta {
        margin-bottom: 32px;
        padding-bottom: 20px;
        border-bottom: 1px solid rgba(197, 160, 89, 0.2);
    }
    .meta-name {
        font-size: 26px;
        font-weight: bold;
        color: #d4c4a8;
        margin-bottom: 6px;
    }
    .meta-field {
        font-size: 13px;
        color: #667eea;
        letter-spacing: 1px;
    }
    .body-text {
        font-size: 16px;
        line-height: 1.9;
        color: #c5c8d6;
    }
    .body-text p { margin-bottom: 1.2em; text-align: justify; }
    .body-text h1, .body-text h2, .body-text h3, .body-text h4, .body-text h5, .body-text h6 {
        color: #d4c4a8;
        margin: 1.5em 0 0.8em;
        line-height: 1.4;
    }
    .body-text h1 {
        font-size: 1.5em;
        border-left: 4px solid #c5a059;
        padding-left: 12px;
    }
    .body-text h2 {
        font-size: 1.3em;
        border-left: 3px solid rgba(197, 160, 89, 0.6);
        padding-left: 10px;
    }
    .body-text h3 { font-size: 1.15em; color: #d4c4a8; }
    .body-text strong, .body-text b { color: #fff; font-weight: 600; }
    .body-text blockquote {
        margin: 1.2em 0;
        padding: 12px 20px;
        border-left: 3px solid #667eea;
        background: rgba(102, 126, 234, 0.08);
        color: #b0b8d0;
        font-style: italic;
    }
    .body-text blockquote p:last-child { margin-bottom: 0; }
    .body-text ul, .body-text ol { margin: 1em 0; padding-left: 2em; }
    .body-text li { margin-bottom: 0.5em; }
    .body-text code {
        background: rgba(255,255,255,0.08);
        padding: 2px 6px;
        border-radius: 4px;
        font-family: 'SF Mono', Monaco, monospace;
        font-size: 0.9em;
        color: #e0c080;
    }
    .body-text pre {
        background: rgba(0,0,0,0.3);
        padding: 16px;
        border-radius: 8px;
        overflow-x: auto;
        margin: 1em 0;
    }
    .body-text pre code { background: none; padding: 0; }
    .body-text hr {
        border: none;
        height: 1px;
        background: linear-gradient(to right, transparent, rgba(197,160,89,0.3), transparent);
        margin: 2em 0;
    }
    .body-text a {
        color: #667eea;
        text-decoration: none;
        border-bottom: 1px solid rgba(102,126,234,0.3);
    }
    .body-text a:hover { border-bottom-color: #667eea; }
    .footer {
        text-align: center;
        padding: 40px 24px 80px;
        border-top: 1px solid rgba(255,255,255,0.08);
    }
    .footer-logo {
        font-size: 18px;
        color: #667eea;
        margin-bottom: 8px;
        letter-spacing: 2px;
    }
    .footer-text {
        font-size: 12px;
        color: #fff;
    }
    .stars {
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        pointer-events: none;
        z-index: -1;
        opacity: 0.4;
        background-image: 
            radial-gradient(2px 2px at 20px 30px, rgba(255,255,255,0.4), transparent),
            radial-gradient(2px 2px at 40px 70px, rgba(255,255,255,0.3), transparent),
            radial-gradient(1px 1px at 90px 40px, rgba(255,255,255,0.4), transparent);
        background-size: 220px 220px;
    }
    .download-bar {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        padding: 16px 24px;
        background: rgba(10, 14, 39, 0.95);
        border-top: 1px solid rgba(102, 126, 234, 0.2);
        display: flex;
        justify-content: center;
        gap: 12px;
        z-index: 100;
        backdrop-filter: blur(10px);
    }
    .download-btn {
        background: #667eea;
        color: white;
        border: none;
        padding: 12px 32px;
        border-radius: 24px;
        font-size: 15px;
        cursor: pointer;
        letter-spacing: 1px;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        gap: 8px;
    }
    .download-btn:hover {
        background: #5a6fd6;
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
    }
    .download-btn:active { transform: translateY(0); }
    .error-msg {
        text-align: center;
        padding: 100px 24px;
        color: #ff6b6b;
    }
</style>
</head>
<body>
<div class="loading" id="loading">✦ <span id="loadingText">加载中...</span></div>
<div id="app" style="display:none;">
    <div class="stars"></div>
    <div class="hero" id="hero"></div>
    <div class="content">
        <div class="meta">
            <div class="meta-name" id="title"></div>
            <div class="meta-field" id="field"></div>
        </div>
        <div class="body-text" id="content"></div>
    </div>
    <div class="footer">
        <div class="footer-logo" id="footerLogo">✦ <span id="footerLogoText"></span></div>
        <div class="footer-text" id="footerText"></div>
    </div>
    <div class="download-bar">
        <button class="download-btn" onclick="downloadPage()">
            <span>💾</span>
            <span id="saveText"></span>
        </button>
    </div>
</div>

<!-- 【按指定顺序引用主应用 JS】 -->
<script src="../scripts/applogic.js"></script>
<script src="../scripts/StarryColumn.js"></script>
<script src="../scripts/importmdfile.js"></script>
<script src="../scripts/speech.js"></script>
<script src="../scripts/createwebpage.js"></script>

<script>
// ═══════════════════════════════════════════════════
// 初始化（复用 createwebpage.js 的全球化体系）
// ═══════════════════════════════════════════════════

// 1. 初始化 shareTextKeys 到 translations（createwebpage.js 中的 initShareTexts）
if (typeof initShareTexts === 'function') {
    initShareTexts();
}

// 2. 确定语言
const lang = window.currentLang || 'zh-CN';

// 3. 设置 html lang
document.documentElement.lang = lang === 'zh-CN' ? 'zh-CN' : 'en';

// 4. 设置字体（与 renderPageContent 一致）
document.body.style.fontFamily = lang === 'zh-CN'
    ? "-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif"
    : "-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif";

// 5. 翻译辅助（与 renderPageContent 完全一致）
const _t = (key) => getFieldValue(shareTextKeys[key], lang) || key;

// ═══════════════════════════════════════════════════
// 页面配置
// ═══════════════════════════════════════════════════
const CONFIG = {
    getColumnName() {
        const path = window.location.pathname;
        const fileName = path.split('/').pop();
        return fileName.replace('.html', '');
    }
};

// ═══════════════════════════════════════════════════
// 加载专栏内容
// ═══════════════════════════════════════════════════
async function loadColumn() {
    const columnName = CONFIG.getColumnName();
    const mdPath = `../StarryColumn/${columnName}.md`;

    // ── 加载封面图 ──
    const imgExtensions = ['jpg', 'png', 'jpeg', 'webp'];
    let coverUrl = '';

    for (const ext of imgExtensions) {
        const imgPath = `../images/${columnName}.${ext}`;
        try {
            const response = await fetch(imgPath, { method: 'HEAD' });
            if (response.ok) {
                coverUrl = imgPath;
                break;
            }
        } catch (e) {}
    }

    // ── 加载并解析 MD ──
    try {
        const response = await fetch(mdPath);
        
        if (!response.ok) {
            if (response.status === 404) {
                throw new Error('FILE_NOT_FOUND');
            }
            throw new Error(`HTTP ${response.status}`);
        }

        const mdContent = await response.text();

        if (!mdContent || mdContent.trim().length === 0) {
            throw new Error('EMPTY_FILE');
        }

        // 【复用】importmdfile.js 中的 parseMDToHistory
        const importedHistory = parseMDToHistory(mdContent);

        if (!importedHistory || importedHistory.length === 0) {
            throw new Error('PARSE_EMPTY');
        }

        // 【复用】applogic.js 中的 getMergedHistory
        const history = getMergedHistory(importedHistory, []);

        // 提取最后一个 AI 节点
        const aiNodes = history.filter(n => n.role === 'ai' || n.role === 'assistant');
        if (aiNodes.length === 0) {
            throw new Error('NO_AI_NODE');
        }
        const lastAiNode = aiNodes[aiNodes.length - 1];

        // ── 准备渲染数据（与 renderPageContent 一致）──
        const title = lastAiNode.leaderInfo?.name || _t('defaultTitle');
        const field = lastAiNode.leaderInfo?.field || '';

        // 【复用】applogic.js 中的 parseMarkdownWithMath
        let htmlContent = lastAiNode._processedText;
        if (!htmlContent) {
            htmlContent = parseMarkdownWithMath(lastAiNode.text);
        }
        htmlContent = htmlContent.replace(/<img[^>]*>/g, '');

        // 封面处理（与 renderPageContent 一致）
        const hasCover = coverUrl && coverUrl.length > 0;
        const heroStyle = hasCover ? '' : 'background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);';
        const heroHtml = hasCover
            ? `<img src="${coverUrl}" alt="${escapeHtml(title)}" style="width:100%;height:100%;object-fit:cover;display:block;">`
            : '';

        // ── 填充 DOM ──
        document.getElementById('title').textContent = title;
        document.getElementById('field').textContent = field;

        const heroEl = document.getElementById('hero');
        heroEl.style.cssText = heroStyle;
        heroEl.innerHTML = heroHtml;

        document.getElementById('content').innerHTML = htmlContent;

        // 【全球化】与 renderPageContent 完全一致
        document.getElementById('loadingText').textContent = lang === 'zh-CN' ? '加载中...' : 'Loading...';
        document.getElementById('footerLogoText').textContent = _t('pageTitleSuffix');
        document.getElementById('footerText').textContent = _t('exploreBoundary');
        document.getElementById('saveText').textContent = lang === 'zh-CN' ? '保存页面' : 'Save Page';

        // 标题：与 renderPageContent 一致
        document.title = `${escapeHtml(title)} ${_t('pageTitleSuffix')}`;

        // 显示页面
        document.getElementById('loading').style.display = 'none';
        document.getElementById('app').style.display = 'block';

        // 【复用】MathJax
        if (window.MathJax && window.MathJax.typesetPromise) {
            MathJax.typesetPromise([document.getElementById('content')])
                .catch(err => console.warn('MathJax error:', err));
        }

    } catch (e) {
        console.error('Failed to load column:', e);

        let errorMsg;
        if (e.message === 'FILE_NOT_FOUND') {
            errorMsg = lang === 'zh-CN' ? `专栏文件不存在：${mdPath}` : `Column file not found: ${mdPath}`;
        } else if (e.message === 'EMPTY_FILE') {
            errorMsg = lang === 'zh-CN' ? '专栏文件内容为空' : 'Column file is empty';
        } else if (e.message === 'PARSE_EMPTY') {
            errorMsg = lang === 'zh-CN' ? '无法解析专栏内容' : 'Unable to parse column content';
        } else if (e.message === 'NO_AI_NODE') {
            errorMsg = lang === 'zh-CN' ? '专栏中没有找到 AI 回答节点' : 'No AI response found in column';
        } else {
            errorMsg = (lang === 'zh-CN' ? '加载失败：' : 'Load failed: ') + e.message;
        }

        document.getElementById('loading').innerHTML = `
            <div class="error-msg">
                <div>${escapeHtml(errorMsg)}</div>
            </div>
        `;
    }
}

// ═══════════════════════════════════════════════════
// 下载页面（与 createwebpage.js 中的 downloadPage 一致）
// ═══════════════════════════════════════════════════
function downloadPage() {
    const html = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;
    const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = document.title.replace(/[\\/:*?"<>|]/g, '_') + '.html';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
}

// ═══════════════════════════════════════════════════
// 启动
// ═══════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', loadColumn);
</script>
</body>
</html>
