<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>加载中...</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        background: #0a0e27;
        color: #e0e0e0;
        line-height: 1.9;
        min-height: 100vh;
        padding-bottom: 100px;
    }
    /* 加载动画 */
    .loading {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        color: #667eea;
        font-size: 16px;
    }
    /* 封面 */
    .hero {
        width: 100%;
        margin-top: 24px;
        text-align: center;
    }
    .hero img {
        width: 90%;
        max-width: 1000px;
        height: auto;
        display: block;
        margin: 0 auto;
    }
    @media (max-width: 768px) {
        .hero img {
            width: 100%;
            max-width: none;
        }
    }
    /* 内容区 */
    .content {
        max-width: 720px;
        margin: 0 auto;
        padding: 40px 24px 60px;
    }
    .meta {
        margin-bottom: 32px;
        padding-bottom: 20px;
        border-bottom: 1px solid rgba(197, 160, 89, 0.2);
    }
    .meta-name {
        font-size: 26px;
        font-weight: bold;
        color: #d4c4a8;
        margin-bottom: 6px;
    }
    .meta-field {
        font-size: 13px;
        color: #667eea;
        letter-spacing: 1px;
    }
    .body-text {
        font-size: 16px;
        line-height: 1.9;
        color: #c5c8d6;
    }
    .body-text p { margin-bottom: 1.2em; text-align: justify; }
    .body-text h1, .body-text h2, .body-text h3, .body-text h4, .body-text h5, .body-text h6 {
        color: #d4c4a8;
        margin: 1.5em 0 0.8em;
        line-height: 1.4;
    }
    .body-text h1 {
        font-size: 1.5em;
        border-left: 4px solid #c5a059;
        padding-left: 12px;
    }
    .body-text h2 {
        font-size: 1.3em;
        border-left: 3px solid rgba(197, 160, 89, 0.6);
        padding-left: 10px;
    }
    .body-text h3 { font-size: 1.15em; color: #d4c4a8; }
    .body-text strong, .body-text b { color: #fff; font-weight: 600; }
    .body-text blockquote {
        margin: 1.2em 0;
        padding: 12px 20px;
        border-left: 3px solid #667eea;
        background: rgba(102, 126, 234, 0.08);
        color: #b0b8d0;
        font-style: italic;
    }
    .body-text blockquote p:last-child { margin-bottom: 0; }
    .body-text ul, .body-text ol { margin: 1em 0; padding-left: 2em; }
    .body-text li { margin-bottom: 0.5em; }
    .body-text code {
        background: rgba(255,255,255,0.08);
        padding: 2px 6px;
        border-radius: 4px;
        font-family: 'SF Mono', Monaco, monospace;
        font-size: 0.9em;
        color: #e0c080;
    }
    .body-text pre {
        background: rgba(0,0,0,0.3);
        padding: 16px;
        border-radius: 8px;
        overflow-x: auto;
        margin: 1em 0;
    }
    .body-text pre code { background: none; padding: 0; }
    .body-text hr {
        border: none;
        height: 1px;
        background: linear-gradient(to right, transparent, rgba(197,160,89,0.3), transparent);
        margin: 2em 0;
    }
    .body-text a {
        color: #667eea;
        text-decoration: none;
        border-bottom: 1px solid rgba(102,126,234,0.3);
    }
    .body-text a:hover { border-bottom-color: #667eea; }
    /* 底部 */
    .footer {
        text-align: center;
        padding: 40px 24px 80px;
        border-top: 1px solid rgba(255,255,255,0.08);
    }
    .footer-logo {
        font-size: 18px;
        color: #667eea;
        margin-bottom: 8px;
        letter-spacing: 2px;
    }
    .footer-text {
        font-size: 12px;
        color: #fff;
    }
    /* 星空背景 */
    .stars {
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        pointer-events: none;
        z-index: -1;
        opacity: 0.4;
        background-image: 
            radial-gradient(2px 2px at 20px 30px, rgba(255,255,255,0.4), transparent),
            radial-gradient(2px 2px at 40px 70px, rgba(255,255,255,0.3), transparent),
            radial-gradient(1px 1px at 90px 40px, rgba(255,255,255,0.4), transparent);
        background-size: 220px 220px;
    }
    /* 下载按钮 */
    .download-bar {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        padding: 16px 24px;
        background: rgba(10, 14, 39, 0.95);
        border-top: 1px solid rgba(102, 126, 234, 0.2);
        display: flex;
        justify-content: center;
        gap: 12px;
        z-index: 100;
        backdrop-filter: blur(10px);
    }
    .download-btn {
        background: #667eea;
        color: white;
        border: none;
        padding: 12px 32px;
        border-radius: 24px;
        font-size: 15px;
        cursor: pointer;
        letter-spacing: 1px;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        gap: 8px;
    }
    .download-btn:hover {
        background: #5a6fd6;
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
    }
    .download-btn:active { transform: translateY(0); }
    /* 错误提示 */
    .error-msg {
        text-align: center;
        padding: 100px 24px;
        color: #ff6b6b;
    }
</style>
</head>
<body>
<div class="loading" id="loading">✦ 加载中...</div>
<div id="app" style="display:none;">
    <div class="stars"></div>
    <div class="hero" id="hero"></div>
    <div class="content">
        <div class="meta">
            <div class="meta-name" id="title"></div>
            <div class="meta-field" id="field"></div>
        </div>
        <div class="body-text" id="content"></div>
    </div>
    <div class="footer">
        <div class="footer-logo">✦ 对话北极星</div>
        <div class="footer-text">书写思想旋律，点燃潜能火花</div>
    </div>
    <div class="download-bar">
        <button class="download-btn" onclick="downloadPage()">
            <span>💾</span>
            <span id="saveText">保存页面</span>
        </button>
    </div>
</div>

<script>
// ═══ 配置 ═══
const CONFIG = {
    // 从当前 HTML 文件名提取专栏名
    // 例如：/StarryColumn/金庸传.html → 金庸传
    getColumnName() {
        const path = window.location.pathname;
        const fileName = path.split('/').pop();  // 金庸传.html
        return fileName.replace('.html', '');     // 金庸传
    }
};

// ═══ 简单 Markdown 转 HTML ═══
function mdToHtml(md) {
    return md
        .replace(/^# (.*$)/gm, '<h1>$1</h1>')
        .replace(/^## (.*$)/gm, '<h2>$1</h2>')
        .replace(/^### (.*$)/gm, '<h3>$1</h3>')
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.*?)\*/g, '<em>$1</em>')
        .replace(/!\[.*?\]\(.*?\)/g, '')
        .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>')
        .replace(/^> (.*$)/gm, '<blockquote>$1</blockquote>')
        .replace(/^[\*\-] (.*$)/gm, '<li>$1</li>')
        .replace(/(<li>.*<\/li>\n?)+/gs, '<ul>$&</ul>')
        .replace(/```[\s\S]*?```/g, '<pre><code>$&</code></pre>')
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/^---+/gm, '<hr>')
        .replace(/\n\n/g, '</p><p>')
        .replace(/^(.+)$/gm, '<p>$1</p>')
        .replace(/<p><(h[1-6]|blockquote|ul|pre|hr)/g, '<$1')
        .replace(/<\/(h[1-6]|blockquote|ul|pre|hr)><\/p>/g, '</$1>');
}

// ═══ 加载专栏内容 ═══
async function loadColumn() {
    const columnName = CONFIG.getColumnName();
    const mdPath = `/StarryColumn/${columnName}.md`;
    
    // 尝试加载封面图
    const imgExtensions = ['jpg', 'png', 'jpeg', 'webp'];
    let coverUrl = '';
    
    for (const ext of imgExtensions) {
        const imgPath = `/images/${columnName}.${ext}`;
        try {
            const response = await fetch(imgPath, { method: 'HEAD' });
            if (response.ok) {
                coverUrl = imgPath;
                break;
            }
        } catch (e) {}
    }
    
    // 如果没有封面，用默认图
    if (!coverUrl) {
        coverUrl = '/images/ambient-starry-column.jpg';
    }
    
    // 加载 MD 内容
    try {
        const response = await fetch(mdPath);
        if (!response.ok) throw new Error('MD not found');
        
        const mdContent = await response.text();
        if (!mdContent.trim()) throw new Error('Empty MD');
        
        // 解析内容
        const htmlContent = mdToHtml(mdContent);
        
        // 渲染页面
        document.getElementById('title').textContent = columnName;
        document.getElementById('field').textContent = '专栏文章';
        
        // 渲染封面
        const heroEl = document.getElementById('hero');
        heroEl.innerHTML = `<img src="${coverUrl}" alt="${columnName}" onerror="this.style.display='none'; this.parentElement.style.background='linear-gradient(135deg, #0f0c29, #302b63, #24243e)';">`;
        
        // 渲染内容
        document.getElementById('content').innerHTML = htmlContent;
        
        // 更新标题
        document.title = `${columnName} · 对话北极星`;
        
        // 显示页面
        document.getElementById('loading').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        
    } catch (e) {
        console.error('Failed to load column:', e);
        document.getElementById('loading').innerHTML = `
            <div class="error-msg">
                <div>加载失败</div>
                <div style="font-size:14px;color:#888;margin-top:10px;">${e.message}</div>
            </div>
        `;
    }
}

// ═══ 下载页面 ═══
function downloadPage() {
    const html = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;
    const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = document.title.replace(/[\\/:*?"<>|]/g, '_') + '.html';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
}

// ═══ 启动 ═══
document.addEventListener('DOMContentLoaded', loadColumn);
</script>
</body>
</html>
