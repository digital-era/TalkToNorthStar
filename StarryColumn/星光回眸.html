<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>еҠ иҪҪдёӯ...</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        background: #0a0e27;
        color: #e0e0e0;

        padding-bottom: 100px;
    }
    .loading {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        color: #667eea;
        font-size: 16px;
    }
    .hero {

    }

    }

        }
    }
    .content {
        max-width: 720px;
        margin: 0 auto;

    }
    .meta {

    }
    .meta-field {
        font-size: 13px;

    }
    .body-text {
        font-size: 16px;

    .body-text p { margin-bottom: 1.2em; text-align: justify; }

    .body-text h1 {
        font-size: 1.5em;
        border-left: 4px solid #c5a059;

    }
    .body-text h2 {
        font-size: 1.3em;
        border-left: 3px solid rgba(197, 160, 89, 0.6);

    }
    .body-text h3 { font-size: 1.15em; color: #d4c4a8; }
    .body-text strong, .body-text b { color: #fff; font-weight: 600; }
    .body-text blockquote {
        margin: 1.2em 0;
        padding: 12px 20px;
        border-left: 3px solid #667eea;

    }
    .body-text blockquote p:last-child { margin-bottom: 0; }

    .footer {

            radial-gradient(2px 2px at 20px 30px, rgba(255,255,255,0.4), transparent),
            radial-gradient(2px 2px at 40px 70px, rgba(255,255,255,0.3), transparent),

    .download-btn {
        background: #667eea;

    }
    .download-btn:hover {
        background: #5a6fd6;
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
    }
    .download-btn:active { transform: translateY(0); }
    .error-msg {
        text-align: center;

    }
</style>
</head>
<body>
<div class="loading" id="loading">вңҰ еҠ иҪҪдёӯ...</div>
<div id="app" style="display:none;">
    <div class="stars"></div>
    <div class="hero" id="hero"></div>
    <div class="content">
        <div class="meta">
            <div class="meta-name" id="title"></div>
            <div class="meta-field" id="field"></div>
        </div>
        <div class="body-text" id="content"></div>
    </div>
    <div class="footer">
        <div class="footer-logo">вңҰ еҜ№иҜқеҢ—жһҒжҳҹ</div>
        <div class="footer-text">д№ҰеҶҷжҖқжғіж—ӢеҫӢпјҢзӮ№зҮғжҪңиғҪзҒ«иҠұ</div>
    </div>
    <div class="download-bar">
        <button class="download-btn" onclick="downloadPage()">
            <span>рҹ’ҫ</span>
            <span id="saveText">дҝқеӯҳйЎөйқў</span>
        </button>
    </div>
</div>

<script>
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// гҖҗеӨҚз”ЁгҖ‘дёҺдё»еә”з”Ёе®Ңе…ЁдёҖиҮҙзҡ„и§Јжһҗ/жёІжҹ“еҮҪж•°
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ

// в”Җв”Җ 1. escapeHtmlпјҲдёҺдё»еә”з”ЁдёҖиҮҙпјүв”Җв”Җ
function escapeHtml(text) {
    if (!text) return '';
    return text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
}

// в”Җв”Җ 2. parseMarkdownWithMathпјҲдёҺдё»еә”з”ЁдёҖиҮҙпјүв”Җв”Җ
function parseMarkdownWithMath(rawText) {
    if (!rawText) return "";

    const mathSegments = [];
    const protectedText = rawText.replace(
        /(\$\$[\s\S]*?\$\$|\\\[[\s\S]*?\\\]|\\\(.*?\\\)|(?<!\\)\$.*?(?<!\\)\$)/gm,
        (match) => {
            mathSegments.push(match);
            return `@@MATH_PLACEHOLDER_${mathSegments.length - 1}@@`;
        }
    );

    const safeText = protectedText
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");

    let htmlContent = "";
    if (typeof marked !== 'undefined') {
        htmlContent = marked.parse(safeText);
    } else {
        htmlContent = safeText.replace(/\n/g, "<br>");
    }

    return htmlContent.replace(/@@MATH_PLACEHOLDER_(\d+)@@/g, (match, index) => {
        return escapeHtml(mathSegments[index]);
    });
}

// в”Җв”Җ 3. parseMDToHistoryпјҲгҖҗеӨҚз”ЁгҖ‘дё»еә”з”Ёзҡ„ MD и§Јжһҗж ёеҝғпјүв”Җв”Җ
/**
 * е°Ҷ Markdown ж–Үжң¬и§ЈжһҗдёәеҜ№иҜқеҺҶеҸІиҠӮзӮ№ж•°з»„
 * дёҺдё»еә”з”Ё importFromMD дёӯи°ғз”Ёзҡ„ parseMDToHistory е®Ңе…ЁдёҖиҮҙ
 * 
 * @param {string} mdContent - Markdown ж–Үд»¶еҶ…е®№
 * @returns {Array} иҠӮзӮ№ж•°з»„ [{role, text, leaderInfo}]
 */
function parseMDToHistory(mdContent) {
    const lines = mdContent.split('\n');
    const history = [];
    let currentNode = null;

    for (let line of lines) {
        const trimmed = line.trim();

        // еҢ№й…Қз”ЁжҲ·иҠӮзӮ№пјҡ## з”ЁжҲ· / ## User
        if (/^##\s*з”ЁжҲ·/i.test(trimmed) || /^##\s*User/i.test(trimmed)) {
            if (currentNode) history.push(currentNode);
            currentNode = {
                role: 'user',
                text: '',
                leaderInfo: null
            };
        }
        // еҢ№й…Қ AI иҠӮзӮ№пјҡ## AI (е§“еҗҚ | йўҶеҹҹ)
        else if (/^##\s*AI\s*\(/i.test(trimmed)) {
            if (currentNode) history.push(currentNode);

            const metaMatch = trimmed.match(/^##\s*AI\s*\(\s*([^|]+)\s*\|\s*([^)]+)\s*\)/i);
            currentNode = {
                role: 'ai',
                text: '',
                leaderInfo: {
                    name: metaMatch ? metaMatch[1].trim() : 'North Star',
                    field: metaMatch ? metaMatch[2].trim() : '',
                    contribution: ''
                }
            };
        }
        // зҙҜз§ҜеҶ…е®№пјҲйқһиҠӮзӮ№ж Үи®°иЎҢпјү
        else if (currentNode && !trimmed.match(/^##\s*(з”ЁжҲ·|User|AI\s*\()/i)) {
            currentNode.text += line + '\n';
        }
    }

    if (currentNode) history.push(currentNode);
    history.forEach(node => node.text = node.text.trim());

    return history;
}

// в”Җв”Җ 4. getMergedHistoryпјҲдёҺдё»еә”з”ЁдёҖиҮҙпјүв”Җв”Җ
function getMergedHistory(imported, current) {
    const result = [];
    if (imported && Array.isArray(imported) && imported.length > 0) {
        result.push(...imported);
    }
    if (current && Array.isArray(current) && current.length > 0) {
        result.push(...current);
    }
    return result;
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// йЎөйқўй…ҚзҪ®
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
const CONFIG = {
    getColumnName() {
        const path = window.location.pathname;
        const fileName = path.split('/').pop();
        return fileName.replace('.html', '');
    }
};

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// еҠ иҪҪдё“ж ҸеҶ…е®№
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
async function loadColumn() {
    const columnName = CONFIG.getColumnName();
    const mdPath = `StarryColumn/${columnName}.md`;

    // в”Җв”Җ еҠ иҪҪе°Ғйқўеӣҫ в”Җв”Җ
    const imgExtensions = ['jpg', 'png', 'jpeg', 'webp'];
    let coverUrl = '';

    for (const ext of imgExtensions) {
        const imgPath = `images/${columnName}.${ext}`;
        try {
            const response = await fetch(imgPath, { method: 'HEAD' });
            if (response.ok) {
                coverUrl = imgPath;
                break;
            }
        } catch (e) {}
    }
    if (!coverUrl) {
        coverUrl = 'images/ambient-starry-column.jpg';
    }

    // в”Җв”Җ еҠ иҪҪе№¶и§Јжһҗ MD в”Җв”Җ
    try {
        const response = await fetch(mdPath);
        if (!response.ok) throw new Error('MD not found');

        const mdContent = await response.text();
        if (!mdContent.trim()) throw new Error('Empty MD');

        // гҖҗеӨҚз”ЁгҖ‘parseMDToHistory вҶ’ и§ЈжһҗдёәиҠӮзӮ№ж•°з»„пјҲдёҺдё»еә”з”Ёе®Ңе…ЁдёҖиҮҙпјү
        const importedHistory = parseMDToHistory(mdContent);

        if (importedHistory.length === 0) {
            throw new Error('No dialogue nodes found');
        }

        // гҖҗеӨҚз”ЁгҖ‘getMergedHistory вҶ’ еҗҲе№¶пјҲеҪ“еүҚж— дјҡиҜқеҺҶеҸІпјҢеҸӘжңүеҜје…Ҙзҡ„пјү
        const history = getMergedHistory(importedHistory, []);

        // жҸҗеҸ–жңҖеҗҺдёҖдёӘ AI иҠӮзӮ№пјҲдёҺ generateNodePage йҖ»иҫ‘дёҖиҮҙпјү
        const aiNodes = history.filter(n => n.role === 'ai');
        if (aiNodes.length === 0) {
            throw new Error('No AI response found in dialogue');
        }
        const lastAiNode = aiNodes[aiNodes.length - 1];

        // в”Җв”Җ жёІжҹ“йЎөйқўпјҲдёҺ renderPageContent иҫ“еҮәдёҖиҮҙпјүв”Җв”Җ
        const title = lastAiNode.leaderInfo?.name || columnName;
        const field = lastAiNode.leaderInfo?.field || 'дё“ж Ҹж–Үз« ';

        // гҖҗеӨҚз”ЁгҖ‘parseMarkdownWithMath вҶ’ жёІжҹ“еҶ…е®№пјҲж”ҜжҢҒе…¬ејҸпјү
        const htmlContent = parseMarkdownWithMath(lastAiNode.text)
            .replace(/<img[^>]*>/g, ''); // з§»йҷӨеӣҫзүҮж ҮзӯҫпјҲдёҺ renderPageContent дёҖиҮҙпјү

        // еЎ«е…… DOM
        document.getElementById('title').textContent = title;
        document.getElementById('field').textContent = field;

        const heroEl = document.getElementById('hero');
        heroEl.innerHTML = `<img src="${coverUrl}" alt="${escapeHtml(title)}" onerror="this.style.display='none'; this.parentElement.style.background='linear-gradient(135deg, #0f0c29, #302b63, #24243e)';">`;

        document.getElementById('content').innerHTML = htmlContent;

        // жӣҙж–°ж Үйўҳ
        document.title = `${title} В· еҜ№иҜқеҢ—жһҒжҳҹ`;

        // жҳҫзӨәйЎөйқў
        document.getElementById('loading').style.display = 'none';
        document.getElementById('app').style.display = 'block';

        // гҖҗеӨҚз”ЁгҖ‘MathJax жёІжҹ“пјҲеҰӮжһңйЎөйқўеј•е…ҘдәҶ MathJaxпјү
        if (window.MathJax && window.MathJax.typesetPromise) {
            MathJax.typesetPromise([document.getElementById('content')])
                .catch(err => console.warn('MathJax error:', err));
        }

    } catch (e) {
        console.error('Failed to load column:', e);
        document.getElementById('loading').innerHTML = `
            <div class="error-msg">
                <div>еҠ иҪҪеӨұиҙҘ</div>
                <div style="font-size:14px;color:#888;margin-top:10px;">${escapeHtml(e.message)}</div>
            </div>
        `;
    }
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// дёӢиҪҪйЎөйқўпјҲдёҺ generateNodePage дёҖиҮҙпјү
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function downloadPage() {
    const html = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;
    const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = document.title.replace(/[\\/:*?"<>|]/g, '_') + '.html';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// еҗҜеҠЁ
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
document.addEventListener('DOMContentLoaded', loadColumn);
</script>
</body>
</html>
